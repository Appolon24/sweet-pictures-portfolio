<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweet Pictures — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:       #e8547a;
    --pink-light: #f28fab;
    --pink-glow:  rgba(232, 84, 122, 0.25);
    --pink-soft:  rgba(232, 84, 122, 0.12);
    --black:      #0a0a0a;
    --black2:     #141414;
    --black3:     #1e1e1e;
    --white:      #ffffff;
    --white-soft: rgba(255,255,255,0.85);
    --white-dim:  rgba(255,255,255,0.35);
    --white-fade: rgba(255,255,255,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 70px 20px 50px;
    position: relative;
    background: linear-gradient(180deg, #0f0408 0%, var(--black) 100%);
  }

  .header-glow {
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 400px; height: 200px;
    background: radial-gradient(ellipse at center top, rgba(232,84,122,0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  .logo-camera {
    font-size: 2.2rem;
    margin-bottom: 12px;
    display: block;
    filter: drop-shadow(0 0 16px var(--pink));
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 10px var(--pink)); }
    50%       { filter: drop-shadow(0 0 24px var(--pink-light)); }
  }

  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 7vw, 5rem);
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--white);
    line-height: 1;
  }
  .logo-text span {
    color: var(--pink);
    font-style: italic;
    font-weight: 400;
  }

  .tagline {
    font-size: 0.62rem;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--pink-light);
    margin-top: 12px;
    font-weight: 600;
  }

  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 22px auto;
    width: fit-content;
  }
  .divider-line {
    width: 60px; height: 1px;
    background: linear-gradient(to right, transparent, var(--pink));
  }
  .divider-line.right {
    background: linear-gradient(to left, transparent, var(--pink));
  }
  .divider-dot { color: var(--pink); font-size: 0.5rem; }

  .subtitle {
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--white-dim);
    font-weight: 300;
  }

  /* ── CATEGORIES GRID ── */
  .categories {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 3px;
    padding: 40px 16px 60px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .category-card {
    position: relative;
    background: var(--black2);
    cursor: pointer;
    overflow: hidden;
    aspect-ratio: 4/3;
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .category-card:hover { transform: scale(1.03); z-index: 2; }

  .card-bg-emoji {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 6rem;
    opacity: 0.06;
    transition: opacity 0.4s, transform 0.5s;
    transform: scale(1.1);
  }
  .category-card:hover .card-bg-emoji { opacity: 0.13; transform: scale(1.25); }

  .card-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(232,84,122,0.06) 0%, transparent 60%);
    transition: opacity 0.4s;
  }
  .category-card:hover .card-gradient { background: linear-gradient(135deg, rgba(232,84,122,0.15) 0%, transparent 60%); }

  .card-border {
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(232,84,122,0.12);
    transition: border-color 0.4s, inset 0.4s;
    pointer-events: none;
  }
  .category-card:hover .card-border { border-color: rgba(232,84,122,0.5); inset: 8px; }

  .card-corner {
    position: absolute;
    width: 18px; height: 18px;
    border-color: var(--pink);
    border-style: solid;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
  }
  .card-corner.tl { top: 6px; left: 6px; border-width: 2px 0 0 2px; transform: translate(4px,4px); }
  .card-corner.br { bottom: 6px; right: 6px; border-width: 0 2px 2px 0; transform: translate(-4px,-4px); }
  .category-card:hover .card-corner { opacity: 1; transform: translate(0,0); }

  .card-content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 24px;
  }

  .card-icon {
    font-size: 2.8rem;
    transition: transform 0.4s, filter 0.4s;
    filter: drop-shadow(0 0 8px transparent);
  }
  .category-card:hover .card-icon {
    transform: translateY(-6px) scale(1.12);
    filter: drop-shadow(0 0 14px var(--pink-glow));
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: var(--white);
    text-align: center;
  }

  .card-count {
    font-size: 0.58rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--pink-light);
    font-weight: 600;
    background: rgba(232,84,122,0.1);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .card-cta {
    position: absolute;
    bottom: 16px;
    background: var(--pink);
    color: var(--white);
    font-size: 0.58rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-weight: 700;
    padding: 6px 16px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.3s;
  }
  .category-card:hover .card-cta { opacity: 1; transform: translateY(0); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.93);
    backdrop-filter: blur(10px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--black2);
    border: 1px solid rgba(232,84,122,0.2);
    max-width: 820px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    position: relative;
    animation: slideUp 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    box-shadow: 0 0 60px rgba(232,84,122,0.08), 0 30px 60px rgba(0,0,0,0.5);
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal-header {
    padding: 28px 36px 20px;
    border-bottom: 1px solid rgba(232,84,122,0.15);
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    background: var(--black2);
    z-index: 1;
  }
  .modal-header-glow {
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(to right, transparent, var(--pink), transparent);
  }
  .modal-icon { font-size: 1.9rem; }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    flex: 1;
    color: var(--white);
  }
  .modal-close {
    background: none;
    border: 1px solid rgba(232,84,122,0.3);
    color: var(--pink);
    width: 36px; height: 36px;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
  }
  .modal-close:hover { background: var(--pink); color: var(--white); border-color: var(--pink); }

  .modal-body { padding: 24px 36px 40px; }

  /* ADD FORM */
  .add-form {
    background: var(--black3);
    border: 1px dashed rgba(232,84,122,0.25);
    padding: 22px;
    margin-bottom: 28px;
    position: relative;
  }
  .add-form-title {
    font-size: 0.6rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--pink);
    margin-bottom: 16px;
    font-weight: 700;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .form-grid input {
    background: var(--black2);
    border: 1px solid rgba(255,255,255,0.07);
    color: var(--white);
    padding: 11px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.78rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }
  .form-grid input:focus {
    border-color: rgba(232,84,122,0.6);
    box-shadow: 0 0 0 3px rgba(232,84,122,0.08);
  }
  .form-grid input::placeholder { color: rgba(255,255,255,0.18); }
  .form-full { grid-column: 1 / -1; }

  .btn-add {
    margin-top: 12px;
    background: var(--pink);
    color: var(--white);
    border: none;
    padding: 11px 28px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.62rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-add:hover { background: var(--pink-light); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,84,122,0.3); }

  /* EVENTS LIST */
  .events-list { display: flex; flex-direction: column; gap: 8px; }

  .event-item {
    background: var(--black3);
    border-left: 3px solid var(--pink);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: background 0.2s, border-color 0.2s;
  }
  .event-item:hover { background: #222; border-left-color: var(--pink-light); }

  .event-info { flex: 1; min-width: 0; }
  .event-name {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--white-soft);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .event-meta {
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--white-dim);
    margin-top: 4px;
  }
  .event-meta span { color: var(--pink-light); margin-right: 14px; }

  .event-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--pink-soft);
    border: 1px solid rgba(232,84,122,0.35);
    color: var(--pink-light);
    padding: 7px 16px;
    text-decoration: none;
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 700;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .event-link:hover { background: var(--pink); color: var(--white); border-color: var(--pink); }

  .btn-delete {
    background: none;
    border: none;
    color: rgba(255,80,80,0.3);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .btn-delete:hover { color: rgba(255,80,80,0.85); }

  .empty-state {
    text-align: center;
    padding: 44px 20px;
    color: var(--white-dim);
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    line-height: 1.8;
  }
  .empty-icon { font-size: 2.8rem; margin-bottom: 12px; opacity: 0.35; display: block; }

  /* ── FOOTER ── */
  footer {
    background: var(--black2);
    border-top: 1px solid rgba(232,84,122,0.15);
    margin-top: 20px;
    padding: 40px 20px 30px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  footer::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 200px; height: 1px;
    background: linear-gradient(to right, transparent, var(--pink), transparent);
  }

  .footer-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--white);
    margin-bottom: 6px;
    letter-spacing: 0.1em;
  }
  .footer-logo span { color: var(--pink); font-style: italic; }

  .footer-tagline {
    font-size: 0.6rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--white-dim);
    margin-bottom: 24px;
  }

  .footer-contact {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .footer-contact-item {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(232,84,122,0.08);
    border: 1px solid rgba(232,84,122,0.2);
    padding: 10px 20px;
    text-decoration: none;
    transition: all 0.2s;
  }
  .footer-contact-item:hover {
    background: rgba(232,84,122,0.18);
    border-color: rgba(232,84,122,0.5);
    transform: translateY(-2px);
  }
  .footer-contact-item .icon { font-size: 1.1rem; }
  .footer-contact-item .label {
    display: flex; flex-direction: column;
    text-align: left;
  }
  .footer-contact-item .label-title {
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--pink-light);
    font-weight: 700;
    line-height: 1;
  }
  .footer-contact-item .label-value {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--white);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  .footer-divider {
    width: 40px; height: 1px;
    background: rgba(232,84,122,0.3);
    margin: 20px auto;
  }

  .footer-copy {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.15);
  }
  .footer-copy span { color: var(--pink); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 2px; }

  /* ── SAVE TOAST ── */
  .save-indicator {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--pink);
    color: var(--white);
    padding: 10px 20px;
    font-size: 0.62rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-weight: 700;
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 9999;
    box-shadow: 0 4px 20px rgba(232,84,122,0.4);
  }
  .save-indicator.show { opacity: 1; transform: translateY(0); }

  /* ── RESPONSIVE ── */
  @media (max-width: 540px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-full { grid-column: 1; }
    .modal-header { padding: 20px; }
    .modal-body { padding: 16px 20px 30px; }
    .footer-contact { flex-direction: column; align-items: center; }
    .footer-contact-item { width: 100%; max-width: 280px; justify-content: center; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-glow"></div>
  <span class="logo-camera">📷</span>
  <div class="logo-text">Sweet <span>Pictures</span></div>
  <div class="tagline">Photographe Professionnel · Bruxelles</div>
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-dot">✦</div>
    <div class="divider-line right"></div>
  </div>
  <div class="subtitle">Portfolio · Galeries Clients</div>
</header>

<!-- CATEGORIES -->
<div class="categories" id="categoriesGrid"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-header-glow"></div>
      <div class="modal-icon" id="modalIcon"></div>
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="add-form">
        <div class="add-form-title">✦ Ajouter une galerie</div>
        <div class="form-grid">
          <input type="text"  id="inputName" placeholder="Nom (ex: Marie & Jean)" />
          <input type="text"  id="inputDate" placeholder="Date (ex: 14 Juin 2025)" />
          <input type="url"   id="inputLink" placeholder="Lien Google Photos / Drive..." class="form-full" />
          <input type="text"  id="inputNote" placeholder="Note optionnelle (lieu, ville...)" class="form-full" />
        </div>
        <button class="btn-add" onclick="addEvent()">✦ Ajouter la galerie</button>
      </div>
      <div class="events-list" id="eventsList"></div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-logo">Sweet <span>Pictures</span></div>
  <div class="footer-tagline">Photographe Professionnel · Bruxelles</div>

  <div class="footer-contact">

    <a href="tel:+32476771185" class="footer-contact-item">
      <span class="icon">📞</span>
      <span class="label">
        <span class="label-title">Téléphone</span>
        <span class="label-value">+32 476 771 185</span>
      </span>
    </a>

    <a href="https://wa.me/32476771185" target="_blank" class="footer-contact-item">
      <span class="icon">💬</span>
      <span class="label">
        <span class="label-title">WhatsApp</span>
        <span class="label-value">+32 476 771 185</span>
      </span>
    </a>

  </div>

  <div class="footer-divider"></div>
  <div class="footer-copy">© 2026 <span>Sweet Pictures</span> · Bruxelles · Tous droits réservés</div>
</footer>

<div class="save-indicator" id="saveIndicator">✓ Sauvegardé</div>

<script>
const CATEGORIES = [
  { id: 'mariage',      icon: '💍', title: 'Mariages' },
  { id: 'bapteme',      icon: '👶', title: 'Baptêmes' },
  { id: 'anniversaire', icon: '🎂', title: 'Anniversaires' },
  { id: 'veillée',      icon: '🕯️', title: 'Veillées mortuaires' },
  { id: 'evenement',    icon: '🎉', title: 'Événements' },
  { id: 'portrait',     icon: '🎭', title: 'Portraits' },
  { id: 'famille',      icon: '👨‍👩‍👧', title: 'Famille' },
  { id: 'video',        icon: '🎬', title: 'Vidéo & Reportage' },
];

function getData() {
  try {
    const raw = localStorage.getItem('sweet_pictures_data');
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveData(data) {
  localStorage.setItem('sweet_pictures_data', JSON.stringify(data));
  const ind = document.getElementById('saveIndicator');
  ind.classList.add('show');
  setTimeout(() => ind.classList.remove('show'), 2200);
}

let currentCategory = null;

function renderCategories() {
  const data = getData();
  const grid = document.getElementById('categoriesGrid');
  grid.innerHTML = CATEGORIES.map(cat => {
    const count = (data[cat.id] || []).length;
    return `
    <div class="category-card" onclick="openModal('${cat.id}')">
      <div class="card-bg-emoji">${cat.icon}</div>
      <div class="card-gradient"></div>
      <div class="card-border"></div>
      <div class="card-corner tl"></div>
      <div class="card-corner br"></div>
      <div class="card-content">
        <div class="card-icon">${cat.icon}</div>
        <div class="card-title">${cat.title}</div>
        <div class="card-count">${count} galerie${count !== 1 ? 's' : ''}</div>
      </div>
      <div class="card-cta">Voir les galeries →</div>
    </div>`;
  }).join('');
}

function openModal(catId) {
  currentCategory = catId;
  const cat = CATEGORIES.find(c => c.id === catId);
  document.getElementById('modalIcon').textContent = cat.icon;
  document.getElementById('modalTitle').textContent = cat.title;
  renderEventsList(catId);
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
  currentCategory = null;
  ['inputName','inputDate','inputLink','inputNote'].forEach(id => document.getElementById(id).value = '');
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function renderEventsList(catId) {
  const data = getData();
  const events = data[catId] || [];
  const list = document.getElementById('eventsList');
  if (events.length === 0) {
    list.innerHTML = `<div class="empty-state"><span class="empty-icon">🌸</span>Aucune galerie pour l'instant.<br>Ajoutez votre premier lien ci-dessus !</div>`;
    return;
  }
  list.innerHTML = events.map((ev, i) => `
    <div class="event-item">
      <div class="event-info">
        <div class="event-name">${ev.name}</div>
        <div class="event-meta">
          ${ev.date ? `<span>📅 ${ev.date}</span>` : ''}
          ${ev.note ? `<span>📍 ${ev.note}</span>` : ''}
        </div>
      </div>
      <a href="${ev.link}" target="_blank" class="event-link">📸 Voir</a>
      <button class="btn-delete" onclick="deleteEvent('${catId}', ${i})" title="Supprimer">🗑</button>
    </div>
  `).join('');
}

function addEvent() {
  const name = document.getElementById('inputName').value.trim();
  const date = document.getElementById('inputDate').value.trim();
  const link = document.getElementById('inputLink').value.trim();
  const note = document.getElementById('inputNote').value.trim();
  if (!name || !link) { alert('Merci de renseigner au minimum le nom et le lien.'); return; }
  const data = getData();
  if (!data[currentCategory]) data[currentCategory] = [];
  data[currentCategory].push({ name, date, link, note });
  saveData(data);
  ['inputName','inputDate','inputLink','inputNote'].forEach(id => document.getElementById(id).value = '');
  renderEventsList(currentCategory);
  renderCategories();
}

function deleteEvent(catId, index) {
  if (!confirm('Supprimer cette galerie ?')) return;
  const data = getData();
  data[catId].splice(index, 1);
  saveData(data);
  renderEventsList(catId);
  renderCategories();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
renderCategories();
</script>
</body>
</html>
